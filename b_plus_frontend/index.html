<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
        <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Roboto+Serif:ital,opsz,wght@0,8..144,100..900;1,8..144,100..900&display=swap" rel="stylesheet"> 
    <style>
        *{
            font-family: 'Poppins',sans-serif;
        }
        body{
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .otp-container{
            text-align: center;
            padding: 30px;
            width: 300px;
            border-radius: 15px;
            box-shadow: 1px 1px 10px #000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        .otp-container h2{
            line-height: 1.3;
            font-size: 28px;
            margin-bottom: 12px;
        }
        .otp-container p{
            font-size: 13px;
        }
        .otp-inputs{
            width: 100%;
            margin-bottom: 20px;
        }
        .otp{
            width: 36px;
            height: 48px;
            margin-left: 15px;
            text-align: center;
            border: 2px solid #fff;
            outline: none;
            background-color: #cdcdcd;
            border-radius: 5px;
            transition: all 0.2s ease-in-out;
            font-size: 17px;
            font-weight: 500;
        }
        .otp:focus{
            border: 2px solid orange;
            background-color: #fff;
        }
        .verifyOTP{
            margin-top: 10px;
            width: 100%;
            padding: 15px;
            cursor: pointer;
            border: 1px solid transparent;
            outline: none;
            font-size: 18px;
            font-weight: 700;
            color: #fff;
            background-color: red;
            border-radius: 10px;
            transition: all 0.3s ease-in-out;
        }
        .verifyOTP:hover{
            color: red;
            background-color: #fff;
            border: 1px solid #000;
        }
        .loader{
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 60px;
            flex-direction: row;
            gap: 20px;
        }
        .dots{
            width: 12px;
            height: 12px;
            background-color: red;
            animation: wiggle 1.4s infinite ease-in-out;
            border-radius: 50%;
            /* border: 1px solid #000; */
        }
        .dots:nth-child(1){
            animation-delay: 0s;
        }
        .dots:nth-child(2){
            animation-delay: 0.1s;
        }
        .dots:nth-child(3){
            animation-delay: 0.2s;
        }
        .dots:nth-child(4){
            animation-delay: 0.3s;
        }
        .dots:nth-child(5){
            animation-delay: 0.4s;
        }
        @keyframes wiggle {
            0%{
                transform: translateY(0);
            }
            25%{
                transform: translateY(-12px);
            }
            50%{
                transform: translateY(0);
            }
            75%{
                transform: translateY(-12px);
            }
            100%{
                transform: translateY(0);
            }
            
        }
        .info{
            margin-top: 0;
            margin-bottom: 25px;
            line-height: 1.5;
            font-weight: 500;
        }
        .resendOTP{
            background-color: transparent;
            color: orange;
            font-weight: 600;
            border: none;
            outline: none;
            cursor: pointer;
            transition: all 0.3s ease-in-out;
            font-size: 16px;
        }
        .resendOTP:hover{
            transform: scale(1.05);
        }
        .req-section{
            font-size: 20px;
            font-weight: 500;
        }
    </style>
</head>
<body>
    <div class="otp-container">
        <div class="loader">
            <span class="dots"></span>
            <span class="dots"></span>
            <span class="dots"></span>
            <span class="dots"></span>
            <span class="dots"></span>
        </div>
        <h2>Verify OTP</h2>
        <p class="info">Enter the 4-digit OTP sent to your Registered Mobile Number</p>
        <div class="otp-inputs">
            <input type="text" maxlength="1" class="otp">
            <input type="text" maxlength="1" class="otp">
            <input type="text" maxlength="1" class="otp">
            <input type="text" maxlength="1" class="otp">
        </div>
        <p class="req-section">Didn't Recieve the Code ?<button class="resendOTP">Resend OTP</button></p>
        <button id="vefifyBtn" class="verifyOTP">Verify Otp</button>
    </div>
    <script>
        const inputs = document.querySelectorAll(".otp");

        inputs.forEach((input, index) => {
            input.addEventListener("input", () => {
                if(input.value.length === 1 && index < inputs.length - 1 ) {
                    inputs[index + 1].focus();
                }
            });

            input.addEventListener("keydown" , (e) => {
                if(e.key === "Backspace" && input.value === "" && index > 0){
                    inputs[index - 1].focus();
                }
            });
        });

    </script>
</body>
</html>
