<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./styles/home.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Roboto+Serif:ital,opsz,wght@0,8..144,100..900;1,8..144,100..900&display=swap" rel="stylesheet"> 
    <link rel="icon" type="image/png" href="./resources/favicon1.png">
    <title>b+</title>
</head>
<body>
    <div class="navbar">
        <div class="menu">
            <img src="./resources/logo.png" alt="b+">
            <ul>
                <li>Home</li>
                <li>How it Works?</li>
                <li>FAQ</li>
                <li>Contact Us</li>
            </ul>
        </div>
        <div class="form-section">
            <button class="log btn">Log in</button>
            <button class="sub btn">Become a Donor</button>
            <button class="sub btn">Be a Volunteer</button>
        </div>
    </div>
    <section class="hero">
            <div class="background">
            <div class="blob1"></div>
            <div class="blob2"></div>
        </div>
        <div class="main">
            <img src="./resources/herobackground.png" alt="" class="bg">
            <div class="hero-section">
                <h1 class="hero-title">GIVE BLOOD</h1>
                <h2 class="sub-title">Save Life</h2>
                <p>
                    Your blood donation can save lives. 
                    Join thousands of heroes who donate blood and give 
                    patients a second chance at life.
                </p>
                <button class="hero-btn">Become a Donor</button>
            </div>
        </div>
    </section>
    <div class="loginPage" id="loginPop">
        <div class="popup-box">
            <iframe src="./login-signup.html"></iframe>
        </div>
    </div>
    <script src="./script/home.js"></script>

</html>
